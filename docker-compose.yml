services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-easy_crm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-easy_crm}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-crm_dev_password}@postgres:5432/${POSTGRES_DB:-easy_crm}
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173
      AWS_REGION: ${AWS_REGION:-us-east-1}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:-}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:-}
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
    ports:
      - "4000:4000"

  mcp-server:
    build:
      context: ./mcp-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-crm_dev_password}@postgres:5432/${POSTGRES_DB:-easy_crm}
      MCP_TRANSPORT: http
      MCP_PORT: 4111
      MCP_SERVICE_TOKEN: ${MCP_SERVICE_TOKEN:-replace_with_local_service_token}
    ports:
      - "4111:4111"

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_BASE_URL: http://localhost:4000
      VITE_AWS_REGION: ${VITE_AWS_REGION:-us-east-1}
      VITE_COGNITO_USER_POOL_ID: ${VITE_COGNITO_USER_POOL_ID:-}
      VITE_COGNITO_CLIENT_ID: ${VITE_COGNITO_CLIENT_ID:-}
      VITE_COGNITO_DOMAIN: ${VITE_COGNITO_DOMAIN:-}
      VITE_COGNITO_REDIRECT_URI: ${VITE_COGNITO_REDIRECT_URI:-http://localhost:5173/auth/callback}
      VITE_COGNITO_LOGOUT_URI: ${VITE_COGNITO_LOGOUT_URI:-http://localhost:5173/}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/index.html:/app/index.html:ro
    depends_on:
      - backend

volumes:
  postgres-data:
