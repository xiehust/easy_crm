    <text x="14" y="24" class="node-title">Resource Summary</text>
    <text x="14" y="48" class="node-sub">1 CloudFront distribution, 1 private S3 frontend bucket with OAI, 1 Cognito user pool/app client/domain</text>
    <text x="14" y="70" class="node-sub">1 ECS cluster with 2 Fargate services, 2 public ALBs, 1 Aurora Serverless v2 PostgreSQL writer</text>
    <text x="14" y="92" class="node-sub">Supporting resources: ECR, Secrets Manager, CloudWatch Logs, IAM, Lambda custom resources, AWS CLI layer</text>
    <text x="14" y="114" class="node-sub">Not in this stack: API Gateway, Route 53, ACM custom certificate, WAF, ElastiCache, SQS, SNS</text>
